<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunda Helper - Contraction Timer</title>
    <style>
        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --accent: #ffe66d;
            --bg: #f7f9fc;
            --text: #2d3436;
            --white: #ffffff;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .container { max-width: 500px; width: 100%; }
        
        /* Header & Timer Card */
        .card {
            background: var(--white);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            text-align: center;
        }

        h1 { color: var(--primary); margin-top: 0; }
        
        .timer-display {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--text);
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }

        /* Buttons */
        .btn {
            border: none;
            border-radius: 50px;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn:active { transform: scale(0.95); }
        .btn-start { background-color: var(--secondary); color: white; }
        .btn-stop { background-color: var(--primary); color: white; }
        .btn-delete { background-color: #dfe6e9; color: #636e72; font-size: 0.9rem; }
        .btn-restore { background-color: var(--accent); color: #2d3436; padding: 5px 15px; width: auto; }

        /* Recommendation Box */
        #alert-box {
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: none;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; }
        }

        /* Lists */
        .history-section { width: 100%; }
        .list-item {
            background: white;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--secondary);
        }
        .list-item.deleted { border-left-color: #b2bec3; opacity: 0.8; }
        .info span { display: block; font-size: 0.8rem; color: #636e72; }
        .info strong { font-size: 1rem; color: var(--text); }

        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #ddd; border-radius: 10px; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>🤰 Bunda Helper</h1>
        <div id="alert-box"></div>
        <div class="timer-display" id="display">00:00</div>
        <button id="mainBtn" class="btn btn-start">MULAI KONTRAKSI</button>
        <p id="status-text">Tekan saat perut mulai kencang</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('active')">Data Aktif</button>
        <button class="tab-btn" onclick="showTab('history')">Riwayat Hapus</button>
    </div>

    <div id="active-tab" class="history-section">
        <button class="btn btn-delete" onclick="deleteAll()">Hapus Semua & Pindahkan ke Riwayat</button>
        <div id="log-list"></div>
    </div>

    <div id="history-tab" class="history-section hidden">
        <h3 style="text-align:center">Riwayat Terhapus</h3>
        <div id="deleted-list"></div>
    </div>
</div>

<script>
    let startTime;
    let timerInterval;
    let isRunning = false;
    let records = JSON.parse(localStorage.getItem('contractions')) || [];
    let historyTrash = JSON.parse(localStorage.getItem('historyTrash')) || [];

    const mainBtn = document.getElementById('mainBtn');
    const display = document.getElementById('display');
    const logList = document.getElementById('log-list');
    const deletedList = document.getElementById('deleted-list');
    const alertBox = document.getElementById('alert-box');

    // Timer Logic
    mainBtn.addEventListener('click', () => {
        if (!isRunning) {
            startTimer();
        } else {
            stopTimer();
        }
    });

    function startTimer() {
        isRunning = true;
        startTime = Date.now();
        mainBtn.textContent = 'STOP (KONTRAKSI BERHENTI)';
        mainBtn.className = 'btn btn-stop';
        
        timerInterval = setInterval(() => {
            const elapsed = Date.now() - startTime;
            display.textContent = formatTime(elapsed);
        }, 100);
    }

    function stopTimer() {
        isRunning = false;
        clearInterval(timerInterval);
        const duration = Math.floor((Date.now() - startTime) / 1000);
        
        const lastRecord = records[0];
        let interval = 0;
        if (lastRecord) {
            interval = Math.floor((startTime - lastRecord.timestamp) / 60000);
        }

        const newRecord = {
            id: Date.now(),
            timestamp: startTime,
            timeLabel: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            duration: duration,
            interval: interval
        };

        records.unshift(newRecord);
        saveAndRender();
        
        display.textContent = "00:00";
        mainBtn.textContent = 'MULAI KONTRAKSI';
        mainBtn.className = 'btn btn-start';
    }

    function formatTime(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const mins = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
        const secs = (totalSeconds % 60).toString().padStart(2, '0');
        return `${mins}:${secs}`;
    }

    // Data Management
    function saveAndRender() {
        localStorage.setItem('contractions', JSON.stringify(records));
        localStorage.setItem('historyTrash', JSON.stringify(historyTrash));
        renderList();
        checkLaborCondition();
    }

    function renderList() {
        logList.innerHTML = '';
        records.forEach(req => {
            logList.innerHTML += `
                <div class="list-item">
                    <div class="info">
                        <strong>Durasi: ${req.duration} detik</strong>
                        <span>Jam: ${req.timeLabel} | Jeda: ${req.interval > 0 ? req.interval + ' mnt' : '-'}</span>
                    </div>
                </div>
            `;
        });

        deletedList.innerHTML = '';
        historyTrash.forEach((item, index) => {
            deletedList.innerHTML += `
                <div class="list-item deleted">
                    <div class="info">
                        <strong>Sesi Hapus #${historyTrash.length - index}</strong>
                        <span>Total: ${item.data.length} rekaman</span>
                    </div>
                    <button class="btn-restore" onclick="viewHistory(${index})">Lihat</button>
                </div>
            `;
        });
    }

    function deleteAll() {
        if (records.length === 0) return;
        if (confirm('Pindahkan semua data ke riwayat terhapus?')) {
            historyTrash.unshift({
                id: Date.now(),
                date: new Date().toLocaleString(),
                data: [...records]
            });
            records = [];
            saveAndRender();
        }
    }

    function viewHistory(index) {
        const item = historyTrash[index];
        let detail = `Riwayat Kontraksi (${item.date}):\n\n`;
        item.data.forEach(d => {
            detail += `- Jam ${d.timeLabel}: Durasi ${d.duration}s (Jeda ${d.interval}m)\n`;
        });
        alert(detail);
    }

    // AI/Teori Recommendation
    function checkLaborCondition() {
        if (records.length < 3) {
            alertBox.style.display = 'none';
            return;
        }

        const avgDuration = records.slice(0, 5).reduce((a, b) => a + b.duration, 0) / Math.min(records.length, 5);
        const avgInterval = records.slice(0, 5).reduce((a, b) => a + b.interval, 0) / Math.min(records.length - 1, 4);

        alertBox.style.display = 'block';
        
        if (avgInterval <= 5 && avgDuration >= 45) {
            alertBox.style.backgroundColor = '#ff7675';
            alertBox.style.color = 'white';
            alertBox.innerHTML = "🚨 SEGERA KE RS! <br> Kontraksi sudah intens dan teratur.";
        } else if (avgInterval <= 10) {
            alertBox.style.backgroundColor = '#ffe66d';
            alertBox.style.color = '#2d3436';
            alertBox.innerHTML = "⚠️ Siap-siap! <br> Kontraksi mulai sering. Hubungi bidan/dokter.";
        } else {
            alertBox.style.backgroundColor = '#55efc4';
            alertBox.style.color = '#2d3436';
            alertBox.innerHTML = "✅ Tetap Tenang <br> Kontraksi masih tahap awal/palsu.";
        }
    }

    function showTab(tab) {
        document.getElementById('active-tab').classList.toggle('hidden', tab !== 'active');
        document.getElementById('history-tab').classList.toggle('hidden', tab !== 'history');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', 
            (tab === 'active' && b.innerText.includes('Aktif')) || 
            (tab === 'history' && b.innerText.includes('Hapus'))
        ));
    }

    // Initial Load
    renderList();
    checkLaborCondition();
</script>

</body>
</html>
